<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | Aura Restaurant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- Hero Section (same as booking page) -->
    <section class="et-slide" id="login">
        <h1>Welcome Back</h1>
        <h3>Login to your account</h3>
    </section>

    <!-- Login Form (using exact same classes as booking form) -->
    <section class="booking-form">
        <div class="form-container">
            <form action="/login" method="post">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                
                <button type="submit" class="submit-btn">Login →</button>
                
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/" style="color: #666; text-decoration: none; font-size: 0.9rem;">Cancel</a>
                </div>
            </form>
        </div>
    </section>

</body>
</html>
