<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <form action="/voucher" method="post">
        <h2>1. Voucher Code (Optional)</h3><br><br>
        <h4>You have {{ curr_reward_points }} reward points</h4><br><br>
        <input type="text" name="voucher_code" placeholder="Enter voucher code"><br><br>

        <h2>{{ message|safe }}</h2>

        <p>Total: £{{ "%.2f"|format(total) }}</p>

        <button type="submit">Next</button>
    </form>

</body>
</html>
