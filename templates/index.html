<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Restaurant | {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- Sticky Navbar with Slider -->
    <div class="et-hero-tabs-container">
        <a href="{{ url_for('home') }}" class="et-hero-tab {% block home_active %}{% endblock %}">Home</a>
        <a href="{{ url_for('bookings') }}" class="et-hero-tab {% block book_active %}{% endblock %}">Book</a>
        <a href="/register" class="et-hero-tab {% block register_active %}{% endblock %}">Register</a>
        <a href="/login" class="et-hero-tab {% block login_active %}{% endblock %}">Login</a>


        <span class="et-hero-tab-slider"></span>
    </div>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            class StickyNavigation {
                constructor() {
                    this.currentId = null;
                    this.currentTab = null;
                    this.tabContainerHeight = 70;
                    let self = this;
                    
                    $('.et-hero-tab').click(function(event) { 
                        // Only handle anchor links (for homepage)
                        if ($(this).attr('href').startsWith('#')) {
                            self.onTabClick(event, $(this)); 
                        }
                    });
                    
                    $(window).scroll(() => { this.onScroll(); });
                    $(window).resize(() => { this.onResize(); });
                    
                    setTimeout(() => {
                        this.findCurrentTabSelector();
                        this.setSliderCss();
                    }, 100);
                }
                
                onTabClick(event, element) {
                    event.preventDefault();
                    let targetId = element.attr('href');
                    let scrollTop = $(targetId).offset().top - this.tabContainerHeight;
                    $('html, body').animate({ scrollTop: scrollTop }, 600);
                }
                
                onScroll() {
                    this.findCurrentTabSelector();
                }
                
                onResize() {
                    if(this.currentId) {
                        this.setSliderCss();
                    }
                }
                
                findCurrentTabSelector() {
                    let newCurrentId = null;
                    let newCurrentTab = null;
                    let self = this;
                    
                    $('.et-hero-tab').each(function() {
                        let id = $(this).attr('href');
                        if (id && id.startsWith('#') && $(id).length) {
                            let offsetTop = $(id).offset().top - self.tabContainerHeight - 10;
                            let offsetBottom = $(id).offset().top + $(id).height() - self.tabContainerHeight;
                            
                            if($(window).scrollTop() >= offsetTop && $(window).scrollTop() < offsetBottom) {
                                newCurrentId = id;
                                newCurrentTab = $(this);
                            }
                        }
                    });
                    
                    if(this.currentId != newCurrentId) {
                        this.currentId = newCurrentId;
                        this.currentTab = newCurrentTab;
                        this.setSliderCss();
                    }
                }
                
                setSliderCss() {
                    if(this.currentTab && this.currentTab.length > 0) {
                        let tabElement = this.currentTab[0];
                        let width = tabElement.getBoundingClientRect().width;
                        let left = tabElement.getBoundingClientRect().left;
                        $('.et-hero-tab-slider').css({
                            'width': width + 'px',
                            'left': left + 'px'
                        });
                    }
                }
            }
            
            new StickyNavigation();
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
