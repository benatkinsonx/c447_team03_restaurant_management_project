{% extends "index.html" %}

{% block title %}Book a Table{% endblock %}

{% block book_active %}active{% endblock %}

{% block content %}
    <section class="et-slide" id="book">
        <h1>Reservations</h1>
        <h3>Book your table for an unforgettable experience</h3>
    </section>

    <section class="booking-form">
        <div class="form-container">
            <form action="{{ url_for('bookings.submit_booking') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}" >
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date"  min="{{ today }}" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" name="time" min="09:00" max="17:30" required>
                    </div>
                    <div class="form-group">
                        <label>Guests</label>
                        <select name="guests">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7+</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Reserve Now →</button>
            </form>
        </div>
    </section>
{% endblock %}
