{% extends "index.html" %}

{% block title %}Book a Table{% endblock %}

{% block book_active %}active{% endblock %}

{% block content %}
    <section class="et-slide" id="book">
        <h1>Reservations</h1>
        <h3>Book your table for an unforgettable experience</h3>
    </section>

    <section class="booking-form">
        <div class="form-container">
            <form action="{{ url_for('bookings.submit_booking') }}" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date"  min="{{ today }}" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <select name="time">
                            <option>13:00</option>
                            <option>13:30</option>
                            <option>14:00</option>
                            <option>14:30</option>
                            <option>15:00</option>
                            <option>15:30</option>
                            <option>16:00</option>
                            <option>16:30</option>
                            <option>17:00</option>
                            <option>17:30</option>
                            <option>18:00</option>
                            <option>18:30</option>
                            <option>19:00</option>
                            <option>19:30</option>
                            <option>20:00</option>
                            <option>20:30</option>
                            <option>21:00</option>
                            <option>21:30</option>
                            <option>22:00</option>
                            <option>22:30</option>
                            <option>23:00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Guests</label>
                        <select name="guests">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7+</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Reserve Now →</button>
            </form>
        </div>
    </section>
{% endblock %}
