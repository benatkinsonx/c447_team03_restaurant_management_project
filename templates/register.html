<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration | Aura Restaurant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <!-- Hero Section (same as booking and login) -->
    <section class="et-slide" id="register">
        <h1>Create Account</h1>
        <h3>Join us for an unforgettable experience</h3>
    </section>

    <!-- Registration Form (using same classes as booking form) -->
    <section class="booking-form">
        <div class="form-container">
            <form action="/register" method="post">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required>
                </div>

                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid #eee;">

                <div class="form-group">
                    <label>Address Line 1</label>
                    <input type="text" name="address1" required>
                </div>

                <div class="form-group">
                    <label>Address Line 2 (Optional)</label>
                    <input type="text" name="address2">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" required>
                    </div>

                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" name="postal_code" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Register →</button>

                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/" style="color: #666; text-decoration: none; font-size: 0.9rem;">Cancel</a>
                </div>
            </form>
        </div>
    </section>

</body>
</html>
