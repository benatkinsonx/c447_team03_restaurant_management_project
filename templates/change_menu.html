{% extends "index.html" %}

{% block title %}Change Menu Item{% endblock %}
{% block menu_active %}active{% endblock %}

{% block content %}
    <section class="et-slide" id="change-menu">
        <h1>Change Menu Item</h1>
        <h3>Update item details</h3>
    </section>

    <section class="booking-form">
        <div class="form-container" style="max-width: 600px;">
            <form action="/admin/menu/change/{{ item.menu_id }}" method="post">
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" name="item_name" value="{{ item.item_name }}" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="cat_id" required>
                        {% for category in categories %}
                            <option value="{{ category.cat_id }}"
                                {% if category.cat_id == item.cat_id %}selected{% endif %}>
                                {{ category.category }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Vegetarian</label>
                    <select name="is_veg" required>
                        <option value="1" {% if item.is_veg %}selected{% endif %}>Yes</option>
                        <option value="0" {% if not item.is_veg %}selected{% endif %}>No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Price (£)</label>
                    <input type="number" step="0.01" name="price" value="{{ item.price }}" required>
                </div>

                <div class="form-group">
                    <label>Available</label>
                    <select name="is_available" required>
                        <option value="1" {% if item.is_available %}selected{% endif %}>In Stock</option>
                        <option value="0" {% if not item.is_available %}selected{% endif %}>Out of Stock</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <button type="submit" class="submit-btn">Save Changes →</button>
                    </div>
                    <div class="form-group">
                        <a href="/admin/menu" style="background: #6c757d; color: white; text-decoration: none; padding: 0.8rem; border-radius: 50px; display: block; text-align: center; font-weight: 600;">Cancel</a>
                    </div>
                </div>

                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            </form>
        </div>
    </section>
{% endblock %}
