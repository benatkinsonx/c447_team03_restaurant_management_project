<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Menu Item</title>
</head>

<body>
    <h1>Change Menu Item</h1>

    <form action="/admin/menu/change/{{ item.menu_id }}" method="post">

        <label>Item name:</label><br>
        <input type="text" name="item_name" value="{{ item.item_name }}" required>
        <br><br>

        <label>Category:</label><br>
        <select name="cat_id" required>
            {% for category in categories %}
                <option value="{{ category.cat_id }}"
                    {% if category.cat_id == item.cat_id %}selected{% endif %}>
                    {{ category.category }}
                </option>
            {% endfor %}
        </select>
        <br><br>

        <label>Veg:</label><br>
        <select name="is_veg" required>
            <option value="1" {% if item.is_veg %}selected{% endif %}>True</option>
            <option value="0" {% if not item.is_veg %}selected{% endif %}>False</option>
        </select>
        <br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" value="{{ item.price }}" required>
        <br><br>

        <label>Available:</label><br>
        <select name="is_available" required>
            <option value="1" {% if item.is_available %}selected{% endif %}>True</option>
            <option value="0" {% if not item.is_available %}selected{% endif %}>False</option>
        </select>
        <br><br>

        <button type="submit">SAVE</button>
        <a href="/admin/menu">Cancel</a>
    </form>
</body>

</html>
